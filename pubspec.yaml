name: lms
description: "LMS - Learning Management System"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.1
  easy_localization: ^3.0.7
  flutter_screenutil: ^5.9.3
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # For dependency injection
  get_it: ^8.0.3
  # Routing and navigations
  go_router: ^9.0.2
  jiffy: ^6.3.2
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  easy_logger: ^0.0.2
  pin_code_fields: ^8.0.1
  provider: ^6.1.2
  iconsax_flutter: ^1.0.1
  infinite_scroll_pagination: ^4.0.0
  carousel_slider: ^5.0.0
  flutter_svg: ^2.0.16
  timeago: ^3.6.0
  intl: ^0.20.2
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_animate: ^4.5.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  # Code generator (mainly used with cubit & retrofit)
  freezed: ^2.5.7
  # Automatically generate code for converting to and from JSON annotation Dart classes
  json_serializable: ^6.9.0


flutter:

  uses-material-design: true

  assets:
    - assets/translation/
    - assets/images/
    - assets/icons/
